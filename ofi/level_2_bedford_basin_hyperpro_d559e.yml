  - description:
      en: The Puck is a miniature version of the popular ECO series of sensors, specifically
        designed for use in AUVs, profiling floats, and Slocum gliders with a dry
        science bay, where space is limited and power requirements are critical.  This
        compact optical sensor is available in combinations of backscattering and
        fluorescence measurements.
      fr: "Le Puck est une version miniature de la c\xE9l\xE8bre s\xE9rie de capteurs\
        \ ECO, sp\xE9cialement con\xE7ue pour \xEAtre utilis\xE9e dans les AUV, les\
        \ flotteurs profil\xE9s et les planeurs Slocum dot\xE9s d'une baie scientifique\
        \ s\xE8che, o\xF9 l'espace est limit\xE9 et o\xF9 les besoins en \xE9nergie\
        \ sont critiques. Ce capteur optique compact est disponible en combinaison\
        \ de mesures de r\xE9trodiffusion et de fluorescence."
    id: ECO puck fluorometer
    manufacturer: WETLabs
    type:
      en: backscattering and fluorescence sensor
      fr: "capteur de r\xE9trodiffusion et de fluorescence"
    version: '5039'
