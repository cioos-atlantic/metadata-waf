identification:
  abstract:
    en: 'The acoustic data were collected between 2015 and 2019 at six stations in
      the southern Gulf of St. Lawrence using two different deployment configurations.
      The dataset also includes audio samples from the Gulf of Maine recorded in 2009,
      which were part of the DCLDE 2013 Challenge dataset (https://soi.st-andrews.ac.uk/static/soi/dclde2013/documents/WorkshopDataset2013.pdf).


      The acoustic data are supplemented by expert annotations indicating the presence/absence
      of North Atlantic right whale upcalls. Spectrogram images are also provided.


      These data have been used to train a deep neural network to detect North Atlantic
      right whale upcalls, as described in the article "Performance of a Deep Neural
      Network at Detecting North Atlantic Right Whale Upcalls" by Kirsebom, Frazao,
      Simard, Roy, Matwin, and Giard (doi:10.1121/10.0001132), which also contains
      a detailed description of the data.


      The software developed as part of this work is available on Zenodo (doi:10.5281/zenodo.3736625)
      under a GPLv3 license. This includes Python scripts for building training and
      test datasets, computing signal-to-noise ratios, visualizing spectrograms, training
      the deep neural network, and using the network to analyze continuous audio recordings.'
    fr: "Les donn\xE9es acoustiques ont \xE9t\xE9 recueillies entre 2015 et 2019 dans\
      \ six stations du sud du golfe du Saint-Laurent en utilisant deux configurations\
      \ de d\xE9ploiement diff\xE9rentes. L'ensemble de donn\xE9es comprend \xE9galement\
      \ des \xE9chantillons audio du golfe du Maine enregistr\xE9s en 2009, qui faisaient\
      \ partie de l'ensemble de donn\xE9es du DCLDE 2013 Challenge (https://soi.st-andrews.ac.uk/static/soi/dclde2013/documents/WorkshopDataset2013.pdf).\n\
      \nLes donn\xE9es acoustiques sont compl\xE9t\xE9es par des annotations d'experts\
      \ indiquant la pr\xE9sence/l'absence d'appels de baleines noires de l'Atlantique\
      \ Nord. Des images de spectrogramme sont \xE9galement fournies.\n\nCes donn\xE9\
      es ont \xE9t\xE9 utilis\xE9es pour entra\xEEner un r\xE9seau neuronal profond\
      \ afin de d\xE9tecter les appels entrants de baleines noires de l'Atlantique\
      \ Nord, comme d\xE9crit dans l'article \xAB\_Performance of a Deep Neural Network\
      \ at Detecting North Atlantic Right Whale Upcalls\_\xBB de Kirsebom, Frazao,\
      \ Simard, Roy, Matwin et Giard (doi:10.1121/10.0001132), qui contient \xE9galement\
      \ une description d\xE9taill\xE9e des donn\xE9es.\n\nLe logiciel d\xE9velopp\xE9\
      \ dans le cadre de ce travail est disponible sur Zenodo (doi:10.5281/zenodo.3736625)\
      \ sous licence GPLv3. Cela inclut des scripts Python pour cr\xE9er des ensembles\
      \ de donn\xE9es d'entra\xEEnement et de test, calculer des rapports signal/bruit,\
      \ visualiser des spectrogrammes, entra\xEEner le r\xE9seau neuronal profond\
      \ et utiliser le r\xE9seau pour analyser des enregistrements audio en continu."
    translations:
      fr:
        message: "text translated using the Amazon translate service / texte traduit\
          \ \xE0 l'aide du service de traduction Amazon"
