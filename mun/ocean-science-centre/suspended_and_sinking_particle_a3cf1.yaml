identification:
  abstract:
    en: This dataset comprises of measurements of Particulate Organic Carbon (POC),
      Particulate Nitrogen (PN), Transparent Exopolymer Particles (TEP), Coomassie
      Stainable Particles (CSP), Particulate Hydrolysable Amino Acids (PHAA), Biogenic
      Silicate (BSi), and Particulate Inorganic Carbon (PIC) in suspended and sinking
      particles at multiple depths during a Phaeocystis bloom in the Labrador Sea
      from 1st to 31st May 2022.
    fr: "Cet ensemble de donn\xE9es comprend des mesures du carbone organique particulaire\
      \ (POC), de l'azote particulaire (PN), des particules d'exopolym\xE8re transparent\
      \ (TEP), des particules colorables de Coomassie (CSP), des acides amin\xE9s\
      \ hydrolysables par particules (PHAA), du silicate biog\xE9nique (BSi) et du\
      \ carbone inorganique particulaire (PIC) dans des particules en suspension et\
      \ coulant \xE0 plusieurs profondeurs lors d'une prolif\xE9ration de pha\xE9\
      ocystes dans la mer du Labrador du 1er au 31 mai 2022."
