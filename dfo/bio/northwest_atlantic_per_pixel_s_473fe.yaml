      url: https://open.canada.ca/en/open-government-licence-canada
    limitations:
      en: Use caution with data in coastal areas, in the central Labrador Sea, and
        in areas where contiguous pixels show large differences. In lieu of using
        a single pixel value over your area of interest, it is advised to use the
        average or median of the pixels within a radius of 20km, preferably after
        filtering outliers. Values with NRMSE (i.e. root mean square error of the
        Gaussian fit normalized to the maximum chl-a concentration) computed during
        the bloom duration exceeding 0.5 should be considered suspicious. Standardized
        anomalies exceeding 3 standard deviations from the mean should also be considered
        suspicious (e.g. calculated as [value-climatology_mean]/climatology_stdev
        for a climatology period of 1998-2024).
      fr: "Les donn\xE9es relatives aux zones c\xF4ti\xE8res sont \xE0 traiter avec\
        \ pr\xE9caution, ainsi que la partie centrale de la mer du Labrador et dans\
        \ les zones o\xF9 des pixels contigus pr\xE9sentent des diff\xE9rences importantes.\
        \ Au lieu d'utiliser une seule valeur de pixel pour la zone qui vous int\xE9\
        resse, il est conseill\xE9 d'utiliser la moyenne ou la m\xE9diane des pixels\
        \ dans un rayon de 20 km, de pr\xE9f\xE9rence apr\xE8s avoir filtr\xE9 les\
        \ valeurs aberrantes. Les valeurs dont le calcul NRMSE (c'est-\xE0-dire l'erreur\
        \ quadratique moyenne de l'ajustement gaussien normalis\xE9 \xE0 la concentration\
        \ maximale de chl-a) pendant la dur\xE9e de la floraison d\xE9passe 0.5 doivent\
        \ \xEAtre consid\xE9r\xE9es comme suspectes. Les anomalies normalis\xE9es\
        \ d\xE9passant 3 \xE9carts-types par rapport \xE0 la moyenne doivent \xE9\
        galement \xEAtre consid\xE9r\xE9es comme suspectes (par exemple, calcul\xE9\
        es comme [valeur \u2013 moyenne_climatologique] / \xE9cart-type climatologique\
        \ pour une p\xE9riode climatologique de 1998 \xE0 2024)."
      translations:
        fr:
          verified: true
