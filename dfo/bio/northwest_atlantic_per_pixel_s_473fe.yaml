distribution:
- description:
    en: Created with map_and_write_to_netcdf.R. Input data were 4km-resolution spring
      bloom metrics and annual average chlorophyll-a (chl-a) concentration per bin.
      Bloom metrics for each bin and year were derived from a shifted gaussian curve
      fitted to the time series of daily logged chl-a data within that bin. Chl-a
      data were taken from the POLY4 chl-a dataset which was generated using remote
      sensing reflectances (Rrs) from the OC-CCI multisensor product (www.oceancolour.org)
      and regionally-tuned coefficients, and subsequently gap-filled using DINEOF
      (https://github.com/aida-alvera/DINEOF).
    fr: "Cr\xE9\xE9es avec map_and_write_to_netcdf.R. Les donn\xE9es d'entr\xE9e sont\
      \ des mesures de floraison printani\xE8re \xE0 une r\xE9solution de 4 km et\
      \ une concentration moyenne annuelle de chlorophylle-a (chl-a) par r\xE9gion.\
      \ Les mesures de floraison pour chaque r\xE9gion et chaque ann\xE9e ont \xE9\
      t\xE9 d\xE9riv\xE9es d'une courbe gaussienne d\xE9cal\xE9e ajust\xE9e \xE0 la\
      \ s\xE9rie temporelle des donn\xE9es chl-a enregistr\xE9es quotidiennement dans\
      \ cette r\xE9gion. Les donn\xE9es Chl-a ont \xE9t\xE9 extraites du jeu de donn\xE9\
      es POLY4 chl-a qui a \xE9t\xE9 g\xE9n\xE9r\xE9 \xE0 l'aide des r\xE9flectances\
      \ de t\xE9l\xE9d\xE9tection (Rrs) du produit multi-capteur OC-CCI (www.oceancolour.org)\
      \ et de coefficients ajust\xE9s au niveau r\xE9gional, puis combl\xE9 les lacunes\
      \ \xE0 l'aide de DINEOF (https://github.com/aida-alvera/DINEOF)."
    translations:
      fr:
        verified: true
  name:
    en: Northwest Atlantic per-pixel spring bloom metrics derived from OC-CCI POLY4
      satellite Chlorophyll-a, 1998-Present
    fr: "Par-Pixel m\xE9triques de la floraison printani\xE8re dans l'Atlantique du\
      \ Nord-ouest d\xE9riv\xE9es de la Chlorophylle-a satellitaire OC-CCI POLY-4"
    translations:
      fr:
        verified: true
  url: https://cioosatlantic.ca/erddap/griddap/bio_remote_sensing_occci_nwa_poly4_spring_bloom
identification:
  abstract:
    en: "This dataset contains the metrics derived from fitting a shifted Gaussian\
      \ to the time series of daily 4km-resolution satellite-derived surface chlorophyll-a\
      \ concentration (Chl-a) within a single pixel for a given year. The fitting\
      \ procedure is the same as that used in the PhytoFit R-shiny application (https://github.com/BIO-RSG/PhytoFit)\
      \ to model the spring phytoplankton bloom within a user-selected region of interest.\
      \ The derived bloom metrics include the day of year of the start of the bloom\
      \ and its duration, the maximum chl-a and the total chl-a produced during the\
      \ bloom period, and the mean annual chl-a. Each year contains these five layers\
      \ as well as two layers describing the quality of the data and the accuracy\
      \ of the Gaussian fit. The metrics cover an area spanning the Northwest Atlantic\
      \ (39-66\xB0N, 42-76\xB0W, excluding Hudson Strait) from 1998 to present. The\
      \ chl-a data used in the time series were the regionally-tuned POLY4 chl-a derived\
      \ from remote sensing reflectance data provided in the OC-CCI multisensor product\
      \ (oceancolour.org), which were gap-filled using the DINEOF method (https://github.com/aida-alvera/DINEOF).\
      \ These metrics can be used to inform on the state of the ecosystem in a particular\
      \ area and its variability over time, which could have implications for higher\
      \ trophic level dynamics."
    fr: "Ce jeu de donn\xE9es contient les mesures d\xE9riv\xE9es de l'ajustement\
      \ d'une courbe gaussienne d\xE9cal\xE9e \xE0 une s\xE9rie temporelle de concentrations\
      \ quotidiennes de chlorophylle-a mesur\xE9es en surface (Chl-a) par d\xE9riv\xE9\
      e par satellite avec une r\xE9solution de 4 km pour chaque pixel pour une ann\xE9\
      e donn\xE9e. La proc\xE9dure d'ajustement est la m\xEAme que celle utilis\xE9\
      e dans l'application PhytoFit R-shiny (https://github.com/BIO-RSG/PhytoFit)\
      \ pour mod\xE9liser la floraison printani\xE8re de phytoplancton dans une r\xE9\
      gion d'int\xE9r\xEAt s\xE9lectionn\xE9e par l'utilisateur. Les param\xE8tres\
      \ d\xE9riv\xE9s de la floraison printani\xE8re comprennent le jour de l'ann\xE9\
      e du d\xE9but de la floraison et sa dur\xE9e, la chl-a maximale et la chl-a\
      \ totale produite pendant la p\xE9riode de floraison, ainsi que la chl-a annuelle\
      \ moyenne. Chaque ann\xE9e contient ces cinq couches ainsi que deux couches\
      \ d\xE9crivant la qualit\xE9 des donn\xE9es et la pr\xE9cision de l'ajustement\
      \ gaussien. Les mesures couvrent une zone s'\xE9tendant sur l'Atlantique Nord-Ouest\
      \ (39-66\xB0N, 42-76\xB0O, \xE0 l'exclusion du d\xE9troit d'Hudson) de 1998\
      \ \xE0 aujourd'hui. Les donn\xE9es chl-a utilis\xE9es dans la s\xE9rie temporelles\
      \ sont les donn\xE9es chl-a POLY4 ajust\xE9es au niveau r\xE9gional, d\xE9riv\xE9\
      es des donn\xE9es de r\xE9flectance de t\xE9l\xE9d\xE9tection fournies par le\
      \ produit multi capteur OC-CCI (oceancolour.org), dont les donn\xE9es manquantes\
      \ ont \xE9t\xE9 calcul\xE9e en utilisant la m\xE9thode DINEOF (https://github.com/aida-alvera/DINEOF).\
      \ Ces mesures peuvent \xEAtre utilis\xE9es pour fournir des informations sur\
      \ l'\xE9tat de l'\xE9cosyst\xE8me dans une zone particuli\xE8re ainsi que sa\
      \ variabilit\xE9 temporelle, ce qui pourrait avoir des implications pour la\
      \ dynamique des niveaux trophiques sup\xE9rieurs."
    translations:
      fr:
        verified: true
