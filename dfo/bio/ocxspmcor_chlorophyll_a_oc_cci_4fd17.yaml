distribution:
- description:
    en: Created with 03b_create_new_chl_files_gridded.R. Input data are 1km-resolution
      level-3 mapped remote sensing reflectances (Rrs) from the OC-CCI multisensor
      product (www.oceancolour.org) generated by the Plymouth Marine Laboratory (PML)
      as part of the European Space Agency (ESA) climate change initiative. Rrs are
      subset to the region of interest and used in conjunction with the most recent
      set of regionally-tuned parameters to create the level-3 mapped product.
    fr: "Cr\xE9\xE9es avec 03b_create_new_chl_files_gridded.r. Les donn\xE9es d'entr\xE9\
      e sont des r\xE9flectances de t\xE9l\xE9d\xE9tection (Rrs) cartographi\xE9es\
      \ de niveau 3 \xE0 une r\xE9solution de 1 km provenant et sont issues du produit\
      \ multi-capteur OC-CCI (www.oceancolour.org) g\xE9n\xE9r\xE9 par le Plymouth\
      \ Marine Laboratory (PML) dans le cadre de l'initiative de l'Agence spatiale\
      \ europ\xE9enne (ESA) sur le changement climatique. Les Rrs sont un sous-ensemble\
      \ de la r\xE9gion d'int\xE9r\xEAt et sont utilis\xE9s conjointement avec l'ensemble\
      \ le plus r\xE9cent de param\xE8tres ajust\xE9s au niveau r\xE9gional pour cr\xE9\
      er le produit cartographi\xE9 de niveau 3."
    translations:
      fr:
        verified: true
  name:
    en: OCxSPMcor Chlorophyll-a OC-CCI Data in the Bay of Fundy, 1997-Present
    fr: "OCxSPMcor Chlorophylle-a donn\xE9es OC-CCI dans la Baie de Fundy, 1997-pr\xE9\
      sent"
    translations:
      fr:
        verified: true
  url: https://cioosatlantic.ca/erddap/griddap/bio_remote_sensing_occci_ocxspmcorchla.html
identification:
  abstract:
    en: "Chlorophyll-a concentration (Chl-a) is used as a proxy for phytoplankton\
      \ biomass to track blooms and monitor the state of the ecosystem. This dataset\
      \ is made of daily 1-km resolution images containing satellite Chl-a values\
      \ computed using the OCxSPM-cor algorithm, covering the period from Sep 1997\
      \ to present day over the Bay of Fundy (43.1-46.2\xB0N, 63.1-68.8\xB0W). Regionally-tuned\
      \ coefficients for OCxSPM-cor Chl-a (Wilson et al., 2024, see resources) were\
      \ obtained by matching satellite pixels to in situ Turner fluorometry Chl-a\
      \ samples within the region of interest. OCxSPM-cor Chl-a optimization used\
      \ a linear regression of OCxSPM-cor against Turner that was forced to the 1:1\
      \ line to reduce the negative bias observed in higher concentrations in the\
      \ default global Chl-a models. Daily Chl-a images were generated by applying\
      \ the optimized OCxSPM-cor algorithm on level-3 binned remote sensing reflectance\
      \ (Rrs) data from the OC-CCI multisensor product generated by the Plymouth Marine\
      \ Laboratory (PML) as part of the European Space Agency (ESA) climate change\
      \ initiative. The Chl-a data were then projected onto an Equidistant Cylindrical\
      \ grid (1x1 km per pixel) using a nearest neighbour method. This model and the\
      \ coefficients computed for the Northwest Atlantic and Bay of Fundy are available\
      \ in the R package oceancolouR (https://github.com/BIO-RSG/oceancolouR)."
    fr: "La concentration de chlorophylle-a (Chl-a) est utilis\xE9e comme indicateur\
      \ de la biomasse du phytoplancton pour suivre les floraisons et surveiller l'\xE9\
      tat de l'\xE9cosyst\xE8me. Cet ensemble de donn\xE9es est constitu\xE9 d'images\
      \ quotidiennes d'une r\xE9solution de 1 km contenant des valeurs satellites\
      \ de Chl-a calcul\xE9es \xE0 l'aide de l'algorithme OCXSPM-CoR, couvrant la\
      \ p\xE9riode allant de septembre 1997 \xE0 aujourd'hui dans la baie de Fundy\
      \ (43,1-46,2\xB0N, 63,1-68,8\xB0W). Les coefficients ajust\xE9s au niveau r\xE9\
      gional pour OCXSPM-Cor CHL-a (Wilson et al., 2024, voir les ressources) ont\
      \ \xE9t\xE9 obtenus en faisant correspondre les pixels du satellite \xE0 des\
      \ mesures de Chl-a de fluorom\xE9trie Turner echantillonn\xE9es in situ dans\
      \ la r\xE9gion d'int\xE9r\xEAt. L'optimisation de OCXSPM-Cor CHL-a a utilis\xE9\
      \ une r\xE9gression lin\xE9aire d'OCxSPM-Cor par rapport aux Chl-a Turner, et\
      \ a \xE9t\xE9 forc\xE9e \xE0 la ligne 1:1 pour r\xE9duire le biais n\xE9gatif\
      \ observ\xE9 \xE0 des concentrations plus \xE9lev\xE9es dans les mod\xE8les\
      \ par d\xE9faut globaux de CHL-a. Des images de Chl-a quotidiennes ont \xE9\
      t\xE9 g\xE9n\xE9r\xE9es en appliquant l'algorithme optimis\xE9 OCXSPM-Cor \xE0\
      \ des donn\xE9es de r\xE9flectance de t\xE9l\xE9d\xE9tection (Rrs) de niveau\
      \ 3 provenant du produit multicapteur OC-CCI g\xE9n\xE9r\xE9 par le Plymouth\
      \ Marine Laboratory (PML) dans le cadre de l'initiative de l'Agence spatiale\
      \ europ\xE9enne (ESA) sur le changement climatique. Les donn\xE9es Chl-a ont\
      \ ensuite \xE9t\xE9 projet\xE9es sur une grille cylindrique \xE9quidistante\
      \ (1 x 1 km par pixel) en utilisant la m\xE9thode du plus proche voisin. Ce\
      \ mod\xE8le et les coefficients calcul\xE9s pour l'Atlantique Nord-Ouest et\
      \ la baie de Fundy sont disponibles dans le package R oceancolouR (https://github.com/BIO-RSG/oceancolouR)."
    translations:
      fr:
        verified: true
