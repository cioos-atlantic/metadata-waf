distribution:
- description:
    en: "Created with make_mapped_netcdf.R. Input data are 4km-resolution level-3\
      \ binned remote sensing reflectances (Rrs) from the OC-CCI multisensor product\
      \ (www.oceancolour.org) generated by the Plymouth Marine Laboratory (PML) as\
      \ part of the European Space Agency (ESA) climate change initiative. Rrs are\
      \ subset to the region of interest and used in conjunction with the most recent\
      \ set of regionally-tuned parameters to create the level-3 binned product. The\
      \ data are then mapped to a Plate Carr\xE9e projection using a nearest-neighbour\
      \ method implemented in bin_to_raster() from the oceancolouR R package."
    fr: "Cr\xE9\xE9es avec make_mapped_netcdf.R. Les donn\xE9es d'entr\xE9e sont des\
      \ r\xE9flectances de t\xE9l\xE9d\xE9tection (Rrs) de niveau 3 \xE0 une r\xE9\
      solution de 4 km et sont issues du produit multi-capteur OC-CCI (www.oceancolour.org)\
      \ g\xE9n\xE9r\xE9 par le Plymouth Marine Laboratory (PML) dans le cadre de l'initiative\
      \ de l'Agence spatiale europ\xE9enne (ESA) sur le changement climatique. Les\
      \ Rrs sont un sous-ensemble de la r\xE9gion d'int\xE9r\xEAt et sont utilis\xE9\
      es conjointement avec l'ensemble le plus r\xE9cent de param\xE8tres ajust\xE9\
      s au niveau r\xE9gional pour cr\xE9er le produit class\xE9 de niveau 3. Les\
      \ donn\xE9es sont ensuite cartographi\xE9es sur une projection Plate Carr\xE9\
      e \xE0 l'aide d'une m\xE9thode du voisin le plus proche impl\xE9ment\xE9e dans\
      \ bin_to_raster () \xE0 partir du package oceancolouR R."
    translations:
      fr:
        verified: true
  name:
    en: POLY4 Chlorophyll-a OC-CCI Data in the Northwest Atlantic, 1997-Present
    fr: "POLY4 Chlorophylle-a donn\xE9es OC-CCI dans l'Atlantique du Nord-ouest, 1997-pr\xE9\
      sent"
    translations:
      fr:
        verified: true
  url: https://cioosatlantic.ca/erddap/griddap/bio_remote_sensing_occci_poly4.html
identification:
  abstract:
    en: "Chlorophyll-a concentration (Chl-a) is used as a proxy for phytoplankton\
      \ biomass to track blooms and monitor the state of the ecosystem. This dataset\
      \ contains daily satellite Chl-a since Sep 1997. The data is at a 4.64x4.64\
      \ km spatial resolution covering an area of the Northwest Atlantic from 39-82\xB0\
      N, 42-95\xB0W. Regionally-tuned coefficients for POLY4 Chl-a (Clay et al., 2019,\
      \ see resources) were obtained by matching level-3 gridded 1km-resolution satellite\
      \ pixels to in situ HPLC (High Performance Liquid Chromatography) Chl-a samples\
      \ within the region of interest. POLY4 Chl-a was then optimized by forcing the\
      \ linear regression of POLY4 against HPLC to the 1:1 line to reduce the negative\
      \ bias observed in higher concentrations in the default global Chl-a models.\
      \ Daily Chl-a images were generated by applying the optimized POLY4 algorithm\
      \ on level-3 binned remote sensing reflectance (Rrs) data from the OC-CCI multisensor\
      \ product generated by the Plymouth Marine Laboratory (PML) as part of the European\
      \ Space Agency (ESA) climate change initiative. The Chl-a data were then projected\
      \ onto an Equidistant Cylindrical grid (4.64x4.64 km per pixel) using a nearest\
      \ neighbour method.  This model and the Northwest Atlantic coefficients are\
      \ available in the R package oceancolouR (https://github.com/BIO-RSG/oceancolouR)."
    fr: "La concentration en chlorophylle-a (chl-a) est utilis\xE9e comme indicateur\
      \ de la biomasse du phytoplancton pour suivre les floraisons et surveiller l'\xE9\
      tat de l'\xE9cosyst\xE8me. Cet ensemble de donn\xE9es contient la chl-a satellitaire\
      \ quotidienne depuis septembre 1997. Les donn\xE9es ont une r\xE9solution spatiale\
      \ de 4,64 x 4,64 km couvrant une zone de l'Atlantique Nord-Ouest de 39 \xE0\
      \ 82\xB0 N et 42 \xE0 95\xB0 W. Les coefficients ajust\xE9s au niveau r\xE9\
      gional pour POLY4 Chl-a (Clay et al., 2019, voir les ressources) ont \xE9t\xE9\
      \ obtenus en faisant correspondre des pixels satellites de niveau 3 d'une r\xE9\
      solution de 1 km \xE0 des \xE9chantillons de Chl-a HPLC (High Performance Liquid\
      \ Chromatography) in situ dans la r\xE9gion d'int\xE9r\xEAt. POLY4 Chl-a a ensuite\
      \ \xE9t\xE9 optimis\xE9 en for\xE7ant la r\xE9gression lin\xE9aire de POLY4\
      \ par rapport \xE0 la HPLC jusqu'\xE0 la ligne 1:1 afin de r\xE9duire le biais\
      \ n\xE9gatif observ\xE9 aux concentrations \xE9lev\xE9es dans les mod\xE8les\
      \ g\xE9n\xE9riques globaux de Chl-a par d\xE9faut. Des images de Chl-a quotidiennes\
      \ ont \xE9t\xE9 g\xE9n\xE9r\xE9es en appliquant l'algorithme POLY4 optimis\xE9\
      \ \xE0 des donn\xE9es de r\xE9flectance de t\xE9l\xE9d\xE9tection (Rrs) de niveau\
      \ 3 provenant du produit multicapteur OC-CCI g\xE9n\xE9r\xE9 par le Plymouth\
      \ Marine Laboratory (PML) dans le cadre de l'initiative sur le changement climatique\
      \ de l'Agence spatiale europ\xE9enne (ASE). Les donn\xE9es Chl-a ont ensuite\
      \ \xE9t\xE9 projet\xE9es sur une grille cylindrique \xE9quidistante (4,64 x\
      \ 4,64 km par pixel) en utilisant la m\xE9thode du plus proche voisin. Ce mod\xE8\
      le et les coefficients de l'Atlantique Nord-Ouest sont disponibles dans le package\
      \ R oceancolouR (https://github.com/BIO-RSG/oceancolouR)."
    translations:
      fr:
        verified: true
