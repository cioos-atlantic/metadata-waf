    limitations:
      en: In situ HPLC data used to optimize the POLY4 Chl-a coefficients were limited
        to the Scotian Shelf, Grand Banks, and the Atlantic Repeat Hydrography Line
        7 West line (AR7W), which runs from Newfoundland and Labrador to the south
        end of Greenland (https://www.bio.gc.ca/science/monitoring-monitorage/azomp-pmzao/azomp-pmzao-en.php).
        For the Gulf of Saint Lawrence, the EOF Chl-a model should be used (https://catalogue.ogsl.ca/en/dataset/ca-cioos_dcb7ed2e-bce9-40c5-a197-71ac6b46bd5c).
        In situ Turner Chl-a data from Baffin Bay and some surrounding areas were
        later provided by Lisa Matthes (Marine Productivity Laboratory, Freshwater
        Institute, DFO), collected during KEBABB (Knowledge and Ecosystem Based Approach
        in Baffin Bay) expeditions from 2019-2024. These were used to collect satellite
        matchups and confirm that the model still performed well in Baffin Bay. Satellite-derived
        Chl-a in the Hudson Bay have not yet been validated and therefore the data
        in this region should be used with caution.
      fr: "Les donn\xE9es HPLC in situ utilis\xE9es pour optimiser les coefficients\
        \ du POLY4 CHL-a ont \xE9t\xE9 limit\xE9es au plateau n\xE9o-\xE9cossais,\
        \ aux Grands Bancs et \xE0 la ligne ouest de la ligne hydrographique 7 de\
        \ l'Atlantique (AR7W), qui s'\xE9tend de Terre-Neuve-et-Labrador \xE0 l'extr\xE9\
        mit\xE9 sud du Groenland (https://www.bio.gc.ca/science/monitoring-monitorage/azomp-pmzao/azomp-pmzao-en.php).\
        \ Pour le golfe du Saint-Laurent, le mod\xE8le EOF Chl-a doit \xEAtre utilis\xE9\
        \ (https://catalogue.ogsl.ca/en/dataset/ca-cioos_dcb7ed2e-bce9-40c5-a197-71ac6b46bd5c).\
        \ Les donn\xE9es Turner CHL-a in situ de la baie de Baffin et de certaines\
        \ zones environnantes ont ensuite \xE9t\xE9 fournies par Lisa Matthes (Laboratoire\
        \ de productivit\xE9 marine, Institut des eaux douces, MPO), recueillies lors\
        \ des exp\xE9ditions KEBABB (Approche bas\xE9e sur les connaissances et les\
        \ \xE9cosyst\xE8mes dans la baie de Baffin) de 2019 \xE0 2024. Ces donn\xE9\
        es ont \xE9t\xE9 utilis\xE9s pour collecter les donn\xE9es satellitaires correspondantes\
        \ et confirmer que le mod\xE8le fonctionne bien dans la baie de Baffin. Les\
        \ Chl-a d\xE9riv\xE9es des satellites dans la baie d'Hudson n'ont pas encore\
        \ \xE9t\xE9 valid\xE9es et les donn\xE9es de cette r\xE9gion doivent donc\
        \ \xEAtre utilis\xE9es avec prudence."
      translations:
        fr:
          verified: true
