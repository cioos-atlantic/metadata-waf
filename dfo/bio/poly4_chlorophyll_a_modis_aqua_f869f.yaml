    limitations:
      en: In situ training data were limited to the Scotian Shelf, Grand Banks, and
        the Atlantic Repeat Hydrography Line 7 West line (AR7W), which runs from Newfoundland
        and Labrador to the south end of Greenland (https://www.bio.gc.ca/science/monitoring-monitorage/azomp-pmzao/azomp-pmzao-en.php).
        For the Gulf of Saint Lawrence, the EOF Chl-a model should be used (https://catalogue.ogsl.ca/en/dataset/ca-cioos_dcb7ed2e-bce9-40c5-a197-71ac6b46bd5c).
        In situ Turner Chl-a data from Baffin Bay and some surrounding areas were
        later provided by Lisa Matthes (Marine Productivity Laboratory, Freshwater
        Institute, DFO), collected during KEBABB (Knowledge and Ecosystem Based Approach
        in Baffin Bay) expeditions from 2019-2024. These were used to collect satellite
        matchups and confirm that the model still performed well in Baffin Bay. Satellite-derived
        Chl-a in the Hudson Bay have not yet been validated and therefore the data
        in this region should be used with caution. MODIS-Aqua data quality began
        deteriorating in 2023, and so the end of this time series might be affected
        by poor data quality (see https://forum.earthdata.nasa.gov/viewtopic.php?t=5333
        for details).
      fr: "Les donn\xE9es d'entra\xEEnement in situ \xE9taient limit\xE9es au plateau\
        \ n\xE9o-\xE9cossais, aux Grands Bancs et \xE0 la ligne ouest de la ligne\
        \ hydrographique 7 de l'Atlantic Repeat (AR7W), qui relie Terre-Neuve-et-Labrador\
        \ \xE0 l'extr\xE9mit\xE9 sud du Gro\xEBnland (https://www.bio.gc.ca/science/monitoring-monitorage/azomp-pmzao/azomp-pmzao-en.php).\
        \ Pour le golfe du Saint-Laurent, le mod\xE8le EOF Chl-A devrait \xEAtre utilis\xE9\
        \ (https://catalogue.ogsl.ca/en/dataset/ca-cioos_dcb7ed2e-bce9-40c5-a197-71ac6b46bd5c).\
        \ Les donn\xE9es Turner CHL-a in situ de la baie de Baffin et de certaines\
        \ zones environnantes ont ensuite \xE9t\xE9 fournies par Lisa Matthes (Laboratoire\
        \ de productivit\xE9 marine, Institut des eaux douces, MPO), recueillies lors\
        \ des exp\xE9ditions KEBABB (Approche bas\xE9e sur les connaissances et les\
        \ \xE9cosyst\xE8mes de la baie de Baffin) de 2019 \xE0 2024. Elles ont \xE9\
        t\xE9 utilis\xE9es pour comparaisons avec les mesures satellitales et confirmer\
        \ que le mod\xE8le reste performant dans la baie de Baffin. Les donn\xE9es\
        \ satellitales de Chl-a dans la baie d'Hudson n'a pas encore \xE9t\xE9 valid\xE9\
        es et doivent donc \xEAtre utilis\xE9es avec prudence. La qualit\xE9 des donn\xE9\
        es MODIS-Aqua a commenc\xE9 \xE0 se d\xE9t\xE9riorer en 2023, et la fin de\
        \ cette s\xE9rie chronologique pourrait donc \xEAtre affect\xE9e par une mauvaise\
        \ qualit\xE9 des donn\xE9es (voir https://forum.earthdata.nasa.gov/viewtopic.php?t=5333\
        \ pour plus de d\xE9tails)."
      translations:
        fr:
          verified: true
platform:
- id: AQUA
  instruments:
  - description:
      en: The Moderate Resolution Imaging Spectroradiometer (MODIS), is a 36-band
        spectroradiometer measuring visible and infrared radiation and obtaining data
        that are being used to derive products ranging from vegetation, land surface
        cover, and ocean chlorophyll fluorescence to cloud and aerosol properties,
        fire occurrence, snow cover on the land, and sea ice cover on the oceans.
        The first MODIS instrument was launched on board the Terra satellite in December
        1999, and the second was launched on Aqua in May 2002.
      fr: "Le spectroradiom\xE8tre imageur \xE0 r\xE9solution mod\xE9r\xE9e (MODIS)\
        \ est un spectroradiom\xE8tre \xE0 36 bandes qui mesure le rayonnement visible\
        \ et infrarouge et obtient des donn\xE9es qui sont utilis\xE9es pour obtenir\
        \ des produits allant de la v\xE9g\xE9tation, de la couverture terrestre et\
        \ de la fluorescence de la chlorophylle des oc\xE9ans aux propri\xE9t\xE9\
        s des nuages et des a\xE9rosols, \xE0 la fr\xE9quence des incendies, \xE0\
        \ la couverture neigeuse des terres et \xE0 la couverture de glace de mer\
        \ sur les oc\xE9ans. Le premier instrument MODIS a \xE9t\xE9 lanc\xE9 \xE0\
        \ bord du satellite Terra en d\xE9cembre 1999, et le second a \xE9t\xE9 lanc\xE9\
        \ sur Aqua en mai 2002."
      translations:
        fr:
          verified: true
