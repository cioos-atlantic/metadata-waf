identification:
  abstract:
    en: "Chlorophyll-a concentration (Chl-a) is used as a proxy for phytoplankton\
      \ biomass to track blooms and monitor the state of the ecosystem. This dataset\
      \ contains daily satellite Chl-a from July 2002 to Dec 2023. The data is at\
      \ a 4.64-km^2 spatial resolution covering an area of the Northwest Atlantic\
      \ from 39-82\xB0N, 42-95\xB0W. Chl-a was generated by applying the POLY4 algorithm\
      \ (Clay et al., 2019, see resources) on level-3 binned remote sensing reflectance\
      \ (Rrs) data retrieved by the Moderate Resolution Imaging Spectroradiometer\
      \ sensor (MODIS) onboard the Aqua satellite, freely downloaded courtesy of NASA's\
      \ Ocean Biology Processing Group (OBPG, https://oceancolor.gsfc.nasa.gov/).\
      \ Regionally-tuned coefficients for POLY4 were generated by matching level-2\
      \ MODIS-Aqua pixels (i.e. individual satellite passes) to in situ HPLC (High\
      \ Performance Liquid Chromatography) Chl-a samples within the region of interest\
      \ according to the procedure described in Clay et al. POLY4 Chl-a was then optimized\
      \ by simultaneously forcing it to the 1:1 line against in situ Chl-a to reduce\
      \ the negative bias observed in higher concentrations. The Chl-a data were then\
      \ projected onto an Equidistant Cylindrical grid (4.64-km^2) using a nearest\
      \ neighbour method.  This model and the Northwest Atlantic coefficients are\
      \ available in the R package oceancolouR (https://github.com/BIO-RSG/oceancolouR)."
    fr: "La concentration en chlorophylle-a (Chl-a) est utilis\xE9e comme indicateur\
      \ de la biomasse du phytoplancton pour suivre les floraisons et surveiller l'\xE9\
      tat de l'\xE9cosyst\xE8me. Cet ensemble de donn\xE9es contient les satellite\
      \ les donn\xE9es quotidiennes de chl-a de juillet 2002 \xE0 d\xE9cembre 2023.\
      \ Les donn\xE9es ont une r\xE9solution spatiale de 4,64 km^2 couvrant une zone\
      \ de l'Atlantique Nord-Ouest de 39 \xE0 82\xB0 N et de 42 \xE0 95\xB0 W. Le\
      \ Chl-a a \xE9t\xE9 g\xE9n\xE9r\xE9e en appliquant l'algorithme POLY4 (Clay\
      \ et al., 2019, voir les ressources) sur des donn\xE9es de r\xE9flectance de\
      \ t\xE9l\xE9d\xE9tection (Rrs) de niveau 3 mesur\xE9es par le spectroradiom\xE8\
      tre imageur \xE0 r\xE9solution mod\xE9r\xE9e (MODIS) \xE0 bord du satellite\
      \ Aqua et t\xE9l\xE9charg\xE9es gratuitement sous l\u2019autorisation du groupe\
      \ de la NASA Ocean Biology Processing Group (OBPG, https://oceancolor.gsfc.nasa.gov/).\
      \ Des coefficients ajust\xE9s au niveau r\xE9gional de l\u2019algorithme POLY4\
      \ ont \xE9t\xE9 g\xE9n\xE9r\xE9s en faisant correspondre des pixels MODIS-Aqua\
      \ de niveau 2 (c'est-\xE0-dire des passages individuels du satellites) \xE0\
      \ des \xE9chantillons de Chl-a mesur\xE9s par HPLC (High Performance Liquid\
      \ Chromatography) in situ dans la r\xE9gion d'int\xE9r\xEAt selon la proc\xE9\
      dure d\xE9crite dans Clay et al. L\u2019algorithme POLY4 Chl-a a ensuite \xE9\
      t\xE9 optimis\xE9 en le for\xE7ant simultan\xE9ment \xE0 suivre la ligne 1:1\
      \ par rapport \xE0 la Chl-a in situ afin de r\xE9duire le biais n\xE9gatif observ\xE9\
      \ \xE0 des concentrations plus \xE9lev\xE9es. Les donn\xE9es Chl-a ont ensuite\
      \ \xE9t\xE9 projet\xE9es sur une grille cylindrique \xE9quidistante (4,64 km^2)\
      \ en utilisant la m\xE9thode du plus proche voisin. Ce mod\xE8le et les coefficients\
      \ ajust\xE9s pour l'Atlantique Nord-Ouest sont disponibles dans le package R\
      \ OceanColour (https://github.com/BIO-RSG/oceancolouR)."
    translations:
      fr:
        verified: true
