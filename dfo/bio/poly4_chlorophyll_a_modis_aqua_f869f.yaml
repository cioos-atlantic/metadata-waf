- description:
    en: "Created with make_mapped_netcdf.R. Input data are 4km-resolution level-3\
      \ binned remote sensing reflectances (Rrs) from NASA OBPG, subset to the region\
      \ of interest and used in conjunction with the most recent set of regionally-tuned\
      \ parameters to generate the level-3 binned product. The data is then mapped\
      \ using a Plate Carr\xE9e projection and an area-weighted mean for pixels with\
      \ multiple overlapping bins."
    fr: "Cr\xE9\xE9es avec MAKE_Mapped_NetCDF.R. Les donn\xE9es d'entr\xE9e sont des\
      \ r\xE9flectances de t\xE9l\xE9d\xE9tection (Rrs) group\xE9es de niveau 3 \xE0\
      \ r\xE9solution de 4 km provenant de l'OBPG de la NASA, sous-ensembles de la\
      \ r\xE9gion d'int\xE9r\xEAt et utilis\xE9es conjointement avec l'ensemble le\
      \ plus r\xE9cent de param\xE8tres ajust\xE9s au niveau r\xE9gional pour g\xE9\
      n\xE9rer le produit group\xE9 de niveau 3. Les donn\xE9es sont ensuite cartographi\xE9\
      es \xE0 l'aide d'une projection Plate Carr\xE9e et d'une moyenne pond\xE9r\xE9\
      e en fonction de la surface pour les pixels comportant plusieurs cases superpos\xE9\
      es."
    translations:
      fr:
        verified: true
