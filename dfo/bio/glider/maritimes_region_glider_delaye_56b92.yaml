identification:
  abstract:
    en: The Atlantic Zone Monitoring Program (AZMP) was implemented in year 1998 by
      the four Atlantic regions of Fisheries and Oceans Canada to collect and analyze
      the biological, chemical, and physical oceanographic field data to characterize
      and understand the causes of oceanic variability at various time scales, provide
      multidisciplinary datasets to establish relationships among variables, and provide
      adequate data to support the development of ocean activities. Ocean gliders
      were first acquired by Fisheries and Oceans Canada in year 2017 and 2018 for
      both the West and East coasts. On the East coast, they have been used to monitor
      hydrographic sections associated with the AZMP. Here, the AZMP Bonavista Bay
      transect is occupied from outside the mouth of Bonavista Bay, Newfoundland Canada
      at (48.733N, 52.967W) in the off-shelf direction approximately 150 nautical
      miles to the continental slope at (49.85N, 49.5W).
    fr: "Le Programme de surveillance de la zone atlantique (AZMP) a \xE9t\xE9 mis\
      \ en \u0153uvre en 1998 par les quatre r\xE9gions de l\u2019Atlantique de P\xEA\
      ches et Oc\xE9ans Canada afin de recueillir et d\u2019analyser des donn\xE9\
      es oc\xE9anographiques biologiques, chimiques et physiques sur le terrain pour\
      \ caract\xE9riser et comprendre les causes de la variabilit\xE9 oc\xE9anique\
      \ \xE0 diff\xE9rentes \xE9chelles de temps, fournir des ensembles de donn\xE9\
      es multidisciplinaires pour \xE9tablir des relations entre les variables et\
      \ fournir des donn\xE9es ad\xE9quates pour soutenir le d\xE9veloppement des\
      \ activit\xE9s oc\xE9aniques. Les planeurs oc\xE9aniques ont \xE9t\xE9 acquis\
      \ pour la premi\xE8re fois par P\xEAches et Oc\xE9ans Canada en 2017 et 2018\
      \ pour les c\xF4tes ouest et est. Sur la c\xF4te est, ils ont \xE9t\xE9 utilis\xE9\
      s pour surveiller les sections hydrographiques associ\xE9es \xE0 l\u2019AZMP.\
      \ Ici, la section transversale de la baie de Bonavista de l\u2019AZMP est occup\xE9\
      e depuis l\u2019ext\xE9rieur de l\u2019embouchure de la baie de Bonavista, \xE0\
      \ Terre-Neuve (Canada), \xE0 (48,733\xB0N, 52,967\xB0O) en direction du large,\
      \ \xE0 environ 150 milles marins du talus continental, \xE0 (49,85\xB0N, 49,5\xB0\
      O)."
