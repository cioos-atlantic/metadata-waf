identification:
  abstract:
    en: The Atlantic Zone Monitoring Program (AZMP) was implemented in year 1998 by
      the four Atlantic regions of Fisheries and Oceans Canada to collect and analyze
      the biological, chemical, and physical oceanographic field data to characterize
      and understand the causes of oceanic variability at various time scales, provide
      multidisciplinary datasets to establish relationships among variables, and provide
      adequate data to support the development of ocean activities. Ocean gliders
      were first acquired by Fisheries and Oceans Canada in year 2017 and 2018 for
      both the West and East coasts. On the East coast, they have been used to monitor
      hydrographic sections associated with the AZMP. Here, Emerald Basin was surveyed
      in support of the Cetacean Passive Acoustic Monitoring Glider Project.
    fr: "Le Programme de surveillance de la zone atlantique (AZMP) a \xE9t\xE9 mis\
      \ en \u0153uvre en 1998 par les quatre r\xE9gions atlantiques de P\xEAches et\
      \ Oc\xE9ans Canada afin de recueillir et d'analyser des donn\xE9es oc\xE9anographiques\
      \ biologiques, chimiques et physiques sur le terrain pour caract\xE9riser et\
      \ comprendre les causes de la variabilit\xE9 oc\xE9anique \xE0 diff\xE9rentes\
      \ \xE9chelles de temps, fournir des ensembles de donn\xE9es multidisciplinaires\
      \ pour \xE9tablir des relations entre les variables et fournir des donn\xE9\
      es ad\xE9quates pour soutenir le d\xE9veloppement des activit\xE9s oc\xE9aniques.\
      \ Les planeurs oc\xE9aniques ont \xE9t\xE9 acquis pour la premi\xE8re fois par\
      \ P\xEAches et Oc\xE9ans Canada en 2017 et 2018 pour les c\xF4tes ouest et est.\
      \ Sur la c\xF4te est, ils ont \xE9t\xE9 utilis\xE9s pour surveiller les sections\
      \ hydrographiques associ\xE9es \xE0 l'AZMP. Ici, le bassin d'\xC9meraude a \xE9\
      t\xE9 \xE9tudi\xE9 dans le cadre du projet de planeur de surveillance acoustique\
      \ passive des c\xE9tac\xE9s."
    translations:
      fr:
        message: Cohere command-a-translate-08-2025, cioos-commons@4c76a84
        verified: false
