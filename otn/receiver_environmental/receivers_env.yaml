distribution:
- description:
    en: ERDDAP timeseries dataset of acoustic receiver temperature and other diagnostic logs
    fr: Ensemble de données chronologiques ERDDAP de la température du récepteur acoustique et d'autres journaux de diagnostic
  url: https://erddap.oceantrack.org/erddap/tabledap/receivers_env.html
identification:
  abstract:
    en: Acoustic receivers are stationary instruments that receive coded pings at specific 
        frequencies from acoustic tags that are attached to marine species. Many of these 
        receivers are capable of logging their internal temperature and tilt angle. The 
        temperature is measured using an uncalibrated sensor, with averaged temperature 
        data reported every hour to the instrument's internal logs.
    fr: Les récepteurs acoustiques sont des instruments fixes qui captent des signaux codés 
        à des fréquences spécifiques émis par des balises acoustiques fixées à des espèces 
        marines. Nombre de ces récepteurs sont capables d'enregistrer leur température 
        interne et leur angle d'inclinaison. La température est mesurée à l'aide d'un 
        capteur non étalonné, et les données de température moyennes sont enregistrées 
        toutes les heures dans les journaux internes de l'instrument.
  dates:
    creation: '2026-05-07'
