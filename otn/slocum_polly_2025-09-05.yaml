identification:
  abstract:
    en: A Teledyne Webb Research Slocum G3s glider was deployed on the Scotian Shelf
      in the Northwest Atlantic Ocean equipped with an InnovaSea VMT, RBR Legato CTD,
      and Rockland Scientific MicroRider to monitor oceanic conditions in a transect
      along the Halifax Line.
    fr: Un planeur Teledyne Webb Research Slocum G3s a été déployé sur le plateau
      néo-écossais dans l'océan Atlantique nord-ouest, équipé d'un VMT InnovaSea,
      d'un RBR Legato CTD et d'un Rockland Scientific MicroRider pour surveiller les
      conditions océaniques dans un transect le long de la ligne Halifax.
  acknowledgement:
    en: This deployment is supported by funding from the Canada Foundation for Innovation
      through the Ocean Tracking Network. Additional logistical support was provided
      by the Ocean Frontiers Institute.
    fr: Ce déploiement est soutenu par le financement de la Fondation canadienne pour
      l'innovation par l'intermédiaire de l'Ocean Tracking Network. Un soutien logistique
      supplémentaire a été fourni par l'Ocean Frontiers Institute.
  dates:
