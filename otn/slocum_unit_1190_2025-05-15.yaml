identification:
  abstract:
    en: A Teledyne Webb Research Slocum G3s glider equipped with passive acoustic
      listening device for a multi-month mission surveying the Western Scotian Slope.
    fr: Un planeur Teledyne Webb Research Slocum G3s équipé d'un dispositif d'écoute
      acoustique passive pour une mission de plusieurs mois d'arpentage du talus néo-écossais
      occidental.
  acknowledgement:
    en: Jasco Applied Sciences led this project, deployed and recovered their Slocum
      glider and supported piloting. The Ocean Tracking Network prepared Jasco’s glider,
      offered remote support for field operations and led functional checks and piloting
      during mission. Thank you to the vessel captains who supported deployment and
      recovery.
    fr: Jasco Applied Sciences a dirigé ce projet, déployé et récupéré son planeur
      Slocum et soutenu le pilotage. L’Ocean Tracking Network a préparé le planeur
      de Jasco, a offert un soutien à distance aux opérations sur le terrain et a
      dirigé les vérifications fonctionnelles et le pilotage pendant la mission. Merci
      aux capitaines des navires qui ont soutenu le déploiement et la récupération.
