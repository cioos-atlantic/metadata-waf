identification:
  abstract:
    en: This glider was deployed on the Scotian Shelf in the Northwest Atlantic Ocean
      with a suite of bio-optical sensors to measure ocean conditions as the NW Atlantic
      phytoplankton spring bloom develops.
    fr: Ce planeur a été déployé sur le plateau néo-écossais dans l'océan Atlantique
      nord-ouest avec une suite de capteurs bio-optiques pour mesurer les conditions
      océaniques à mesure que se développe la prolifération printanière du phytoplancton
      de l'Atlantique nord-ouest.
  acknowledgement:
    en: This deployment is supported by funding from the Canada Foundation for Innovation
      through the Ocean Tracking Network. Additional logistical support was provided
      by the Ocean Frontiers Institute.
    fr: Ce déploiement est soutenu par le financement de la Fondation canadienne pour
      l'innovation par l'intermédiaire de l'Ocean Tracking Network. Un soutien logistique
      supplémentaire a été fourni par l'Ocean Frontiers Institute.
  dates:
