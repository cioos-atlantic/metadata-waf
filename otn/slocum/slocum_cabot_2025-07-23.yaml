identification:
  abstract:
    en: This glider was prepared with an ASL AZFP, WIlliamson Shadowgraph camera,
      Seabird ecopuck, Seabird pumped CTD, and Innovasea VMT mounted. It was deployed
      around a pod of North Atlantic Right Whales to collect environmental data to
      be validated against ship-based oceanographic sampling occurring along side
      glider
    fr: Ce planeur a été préparé avec un ASL AZFP, une caméra WIlliamson Shadowgraph,
      un ecopuck Seabird, un CTD pompé Seabird et un Innovasea VMT monté. Il a été
      déployé autour d'un groupe de baleines noires de l'Atlantique Nord pour collecter
      des données environnementales à valider par rapport à un échantillonnage océanographique
      effectué à bord d'un navire le long d'un planeur.
  acknowledgement:
    en: The study was funded by the Ocean Tracking Network in collaboration with Kim
      Davies at the University of New Brunswick. The Ocean Tracking Network led this
      project and their glider team expertly prepared, deployed, piloted and recovered
      the gliders. The Williamson Shadowgraph camera was loaned to the Ocean Tracking
      Network by Kim Davies at the University of New Brunswick. Additional logistical
      support was provided by the Ocean Frontiers Institute. Thank you to the vessel
      captains who supported deployment and recovery.
    fr: L'étude a été financée par l'Ocean Tracking Network en collaboration avec
      Kim Davies de l'Université du Nouveau-Brunswick. L'Ocean Tracking Network a
      dirigé ce projet et son équipe de planeurs a préparé, déployé, piloté et récupéré
      les planeurs de manière experte. La caméra Williamson Shadowgraph a été prêtée
      au Ocean Tracking Network par Kim Davies de l'Université du Nouveau-Brunswick.
      Un soutien logistique supplémentaire a été fourni par l'Ocean Frontiers Institute.
      Merci aux capitaines des navires qui ont soutenu le déploiement et la récupération.
