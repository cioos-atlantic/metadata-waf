identification:
  abstract:
    en: Short test offshore HFX to test platform after repair. We also tested the
      integration of an Ocean Sonics icListen hydrophone. The icListen was wired into
      the science bay as a logger (power on and power off functions only).
    fr: Court test offshore HFX pour tester la plateforme après réparation. Nous avons
      également testé l'intégration d'un hydrophone Ocean Sonics icListen. L'icListen
      a été connecté à la baie scientifique en tant qu'enregistreur (fonctions de
      mise sous et hors tension uniquement).
  acknowledgement:
    en: This deployment is supported by funding from the Canada Foundation for Innovation
      through the Ocean Tracking Network. Additional logistical support was provided
      by the Ocean Frontiers Institute.
    fr: Ce déploiement est soutenu par le financement de la Fondation canadienne pour
      l'innovation par l'intermédiaire de l'Ocean Tracking Network. Un soutien logistique
      supplémentaire a été fourni par l'Ocean Frontiers Institute.
