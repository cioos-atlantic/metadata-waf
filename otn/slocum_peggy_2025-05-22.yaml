identification:
  abstract:
    en: A Teledyne Webb Research Slocum G3(s) glider equipped with passive acoustic
      listening device (DMON) for a multi-month mission with an extended lithium primary
      battery pack. The purpose of this mission is to monitor the Gulf of Saint Lawrence
      shipping lane for the presence of North Atlantic right whales.
    fr: Un planeur Teledyne Webb Research Slocum G3(s) équipé d'un dispositif d'écoute
      acoustique passive (DMON) pour une mission de plusieurs mois avec une batterie
      primaire au lithium étendue. Le but de cette mission est de surveiller la voie
      de navigation du golfe du Saint-Laurent pour détecter la présence de baleines
      noires de l'Atlantique Nord.
  acknowledgement:
    en: The study was funded by Transport Canada's Innovation Centre (TC/IC) and supported
      by Vandana Gopeechund and Alison Butko at the IC. The DMON hydrophone, real-time
      acoustic software, and automated dissemination of near real-time detections
      to partners were provided through collaboration with Dr. Mark Baumgartner at
      the Woods Hole Oceanographic Institution. The Ocean Tracking Network led this
      project and their glider team expertly prepared, deployed, piloted and recovered
      the gliders. Additional logistical support was provided by the Ocean Frontiers
      Institute. Thank you to the vessel captains who supported deployment and recovery.
    fr: L'étude a été financée par le Centre d'innovation de Transports Canada (TC/IC)
      et soutenue par Vandana Gopeechund et Alison Butko du IC. L'hydrophone DMON,
      le logiciel acoustique en temps réel et la diffusion automatisée des détections
      en temps quasi réel aux partenaires ont été fournis grâce à la collaboration
      avec le Dr Mark Baumgartner de la Woods Hole Oceanographic Institution. L'Ocean
      Tracking Network a dirigé ce projet et son équipe de planeurs a préparé, déployé,
      piloté et récupéré les planeurs de manière experte. Un soutien logistique supplémentaire
      a été fourni par l'Ocean Frontiers Institute. Merci aux capitaines des navires
      qui ont soutenu le déploiement et la récupération.
