identification:
  abstract:
    en: Spring Slocum Glider Survey. Slocum gliders are small, free-swimming, unmanned
      vehicles\n                that use changes in buoyancy to move vertically and
      horizontally through the water column in a saw-tooth\n                pattern.
      They are deployed for days to several months and gather detailed information
      about the\n                physical, chemical and biological processes of the
      world's oceans. The Slocum glider was designed and\n                built by
      Teledyne Webb Research Corporation, Falmouth, MA, USA.
    fr: FRENCH
